<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" font-family="'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#12122a"/>
      <stop offset="100%" style="stop-color:#1a1a35"/>
    </linearGradient>
    <linearGradient id="leaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <linearGradient id="eulerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f53ac"/>
      <stop offset="100%" style="stop-color:#647dee"/>
    </linearGradient>
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2193b0"/>
      <stop offset="100%" style="stop-color:#6dd5ed"/>
    </linearGradient>
    <linearGradient id="sentinelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eb3349"/>
      <stop offset="100%" style="stop-color:#f45c43"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="atlasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ee9ca7"/>
      <stop offset="100%" style="stop-color:#ffdde1"/>
    </linearGradient>
    <linearGradient id="chronicleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <linearGradient id="approvalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c94b4b"/>
      <stop offset="100%" style="stop-color:#4b134f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd200" opacity="0.8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6dd5ed" opacity="0.8"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f45c43" opacity="0.8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38ef7d" opacity="0.8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647dee" opacity="0.8"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1000" fill="url(#bg)" rx="16"/>

  <!-- ═══════ Header ═══════ -->
  <text x="600" y="42" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold" letter-spacing="3">Agent Teams Coder</text>
  <text x="600" y="68" text-anchor="middle" fill="#999" font-size="14">Multi-Agent Software Development Collaboration Framework</text>
  <text x="600" y="88" text-anchor="middle" fill="#666" font-size="12">github.com/Xinjing-Guo/Agent-Teams-Coder  &#x00b7;  Developer: Xinjing Guo</text>

  <!-- ═══════ User Node ═══════ -->
  <rect x="510" y="105" width="180" height="46" rx="23" fill="#2a2a3a" stroke="#666" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="575" y="134" fill="#ddd" font-size="18" font-weight="500">&#x1f464; User</text>
  <line x1="600" y1="151" x2="600" y2="185" stroke="#ffd200" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)" opacity="0.7"/>

  <!-- ═══════ Marshall (Leader) ═══════ -->
  <rect x="400" y="188" width="400" height="78" rx="16" fill="url(#leaderGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="600" y="218" text-anchor="middle" fill="#1a1a2e" font-size="22" font-weight="bold">&#x1f451; Marshall  (Leader)</text>
  <text x="600" y="242" text-anchor="middle" fill="#333" font-size="14">Task Decomposition &#x2192; Assignment &#x2192; Memory Approval &#x2192; Delivery</text>
  <text x="600" y="258" text-anchor="middle" fill="#555" font-size="11">skill: task-decomposition</text>

  <!-- Leader → member lines -->
  <path d="M 460 266 Q 280 310 200 340" stroke="#ffd200" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGold)" opacity="0.5"/>
  <path d="M 510 266 Q 460 310 440 340" stroke="#ffd200" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGold)" opacity="0.5"/>
  <path d="M 600 266 L 600 340" stroke="#ffd200" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGold)" opacity="0.5"/>
  <path d="M 690 266 Q 720 310 740 340" stroke="#ffd200" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGold)" opacity="0.5"/>
  <path d="M 740 266 Q 900 310 960 340" stroke="#ffd200" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGold)" opacity="0.5"/>

  <!-- ═══════ Row 1: Euler, Forge, Sentinel ═══════ -->

  <!-- Euler -->
  <rect x="70" y="342" width="260" height="100" rx="14" fill="url(#eulerGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="200" y="372" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">&#x1f9ee; Euler</text>
  <text x="200" y="395" text-anchor="middle" fill="#e0d0ff" font-size="14">Algorithm Designer</text>
  <text x="200" y="415" text-anchor="middle" fill="#c0b0e0" font-size="12">Modeling &#x00b7; Complexity &#x00b7; Pseudocode</text>
  <text x="200" y="433" text-anchor="middle" fill="#b0a0d0" font-size="11" font-style="italic">"Conclusion first, then proof"</text>

  <!-- Forge -->
  <rect x="360" y="342" width="260" height="100" rx="14" fill="url(#forgeGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="490" y="372" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">&#x1f528; Forge</text>
  <text x="490" y="395" text-anchor="middle" fill="#d0f0ff" font-size="14">Code Developer</text>
  <text x="490" y="415" text-anchor="middle" fill="#a0d8e8" font-size="12">Python &#x00b7; C/C++ &#x00b7; R &#x00b7; Julia &#x00b7; Shell</text>
  <text x="490" y="433" text-anchor="middle" fill="#90c8d8" font-size="11" font-style="italic">"Let the code speak"</text>

  <!-- Sentinel -->
  <rect x="650" y="342" width="260" height="100" rx="14" fill="url(#sentinelGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="780" y="372" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">&#x1f6e1; Sentinel</text>
  <text x="780" y="395" text-anchor="middle" fill="#ffd0d0" font-size="14">Code Tester</text>
  <text x="780" y="415" text-anchor="middle" fill="#e0b0b0" font-size="12">pytest &#x00b7; GTest &#x00b7; valgrind &#x00b7; Coverage</text>
  <text x="780" y="433" text-anchor="middle" fill="#d0a0a0" font-size="11" font-style="italic">"The last line of defense"</text>

  <!-- Euler ↔ Forge arrows -->
  <line x1="330" y1="375" x2="360" y2="375" stroke="#647dee" stroke-width="3" marker-end="url(#arrowPurple)" filter="url(#glow)"/>
  <line x1="360" y1="400" x2="330" y2="400" stroke="#6dd5ed" stroke-width="3" marker-end="url(#arrowBlue)" filter="url(#glow)"/>
  <text x="345" y="367" text-anchor="middle" fill="#9090ff" font-size="11">Algorithm</text>
  <text x="345" y="415" text-anchor="middle" fill="#60d0e0" font-size="11">Feedback</text>

  <!-- Forge → Sentinel -->
  <line x1="620" y1="380" x2="650" y2="380" stroke="#6dd5ed" stroke-width="2.5" marker-end="url(#arrowBlue)" opacity="0.8"/>
  <text x="635" y="372" text-anchor="middle" fill="#6dd5ed" font-size="11">Code</text>
  <!-- Sentinel → Forge (Bug) -->
  <line x1="650" y1="405" x2="620" y2="405" stroke="#f45c43" stroke-width="2.5" marker-end="url(#arrowRed)" opacity="0.8"/>
  <text x="635" y="420" text-anchor="middle" fill="#f45c43" font-size="11">Bug</text>

  <!-- ═══════ Row 2: Lens, Atlas ═══════ -->

  <!-- Lens -->
  <rect x="210" y="520" width="260" height="100" rx="14" fill="url(#lensGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="340" y="550" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">&#x1f50d; Lens</text>
  <text x="340" y="573" text-anchor="middle" fill="#d0ffd0" font-size="14">Code Analyst</text>
  <text x="340" y="593" text-anchor="middle" fill="#a0d8a0" font-size="12">Architecture &#x00b7; Functions &#x00b7; Line-by-line</text>
  <text x="340" y="611" text-anchor="middle" fill="#90c890" font-size="11" font-style="italic">"Insight into every line of code"</text>

  <!-- Atlas -->
  <rect x="540" y="520" width="260" height="100" rx="14" fill="url(#atlasGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="670" y="550" text-anchor="middle" fill="#4a2030" font-size="20" font-weight="bold">&#x1f4d6; Atlas</text>
  <text x="670" y="573" text-anchor="middle" fill="#6a3040" font-size="14">Documentation Engineer</text>
  <text x="670" y="593" text-anchor="middle" fill="#7a4050" font-size="12">Manual: Intro &#x00b7; Guide &#x00b7; Examples &#x00b7; Code</text>
  <text x="670" y="611" text-anchor="middle" fill="#8a5060" font-size="11" font-style="italic">"Anyone can understand and use it"</text>

  <!-- Lens → Atlas -->
  <line x1="470" y1="565" x2="540" y2="565" stroke="#38ef7d" stroke-width="3" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <text x="505" y="555" text-anchor="middle" fill="#38ef7d" font-size="12">Analysis Report</text>

  <!-- Sentinel → Atlas -->
  <path d="M 780 442 Q 780 482 700 510" stroke="#f45c43" stroke-width="2" fill="none" marker-end="url(#arrowRed)" opacity="0.7"/>
  <text x="770" y="485" fill="#f45c43" font-size="11">Test Cases</text>

  <!-- Forge → Lens -->
  <path d="M 440 442 Q 400 480 370 510" stroke="#6dd5ed" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)" opacity="0.5"/>

  <!-- ═══════ Chronicle (right panel) ═══════ -->
  <rect x="950" y="188" width="220" height="432" rx="14" fill="url(#chronicleGrad)" filter="url(#shadow)" opacity="0.12"/>
  <rect x="960" y="198" width="200" height="90" rx="12" fill="url(#chronicleGrad)" filter="url(#shadow)" opacity="0.92"/>
  <text x="1060" y="230" text-anchor="middle" fill="#003" font-size="20" font-weight="bold">&#x1f4dc; Chronicle</text>
  <text x="1060" y="253" text-anchor="middle" fill="#004" font-size="14">Log Recorder</text>
  <text x="1060" y="275" text-anchor="middle" fill="#005" font-size="11">skill: activity-logging</text>

  <text x="1060" y="315" text-anchor="middle" fill="#4facfe" font-size="14" font-weight="600">&#x1f4e1; Monitors All</text>
  <g opacity="0.7" font-size="13" fill="#70c0ff">
    <text x="1060" y="340" text-anchor="middle">&#x25cf; Marshall tasks</text>
    <text x="1060" y="362" text-anchor="middle">&#x25cf; Euler algorithms</text>
    <text x="1060" y="384" text-anchor="middle">&#x25cf; Forge code</text>
    <text x="1060" y="406" text-anchor="middle">&#x25cf; Sentinel tests</text>
    <text x="1060" y="428" text-anchor="middle">&#x25cf; Lens analysis</text>
    <text x="1060" y="450" text-anchor="middle">&#x25cf; Atlas docs</text>
  </g>
  <text x="1060" y="480" text-anchor="middle" fill="#4facfe" font-size="12">&#x1f4cb; Generates update summaries</text>

  <!-- Chronicle monitor lines -->
  <line x1="950" y1="240" x2="800" y2="230" stroke="#00f2fe" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="950" y1="380" x2="910" y2="390" stroke="#00f2fe" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="950" y1="450" x2="800" y2="570" stroke="#00f2fe" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>

  <!-- ═══════ SHARED MEMORY MECHANISM (key section) ═══════ -->
  <rect x="70" y="660" width="1060" height="175" rx="16" fill="url(#memoryGrad)" filter="url(#shadow)" opacity="0.9" stroke="#3498db" stroke-width="1.5"/>

  <!-- Title bar -->
  <text x="600" y="690" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">&#x1f4be; Shared Memory Governance</text>
  <text x="600" y="710" text-anchor="middle" fill="#8ab8d8" font-size="12">The core mechanism ensuring team knowledge consistency</text>

  <!-- Three boxes inside -->
  <!-- shared-memory.json -->
  <rect x="90" y="722" width="280" height="95" rx="10" fill="#1a3050" stroke="#4a90d9" stroke-width="1.2" opacity="0.9"/>
  <text x="230" y="745" text-anchor="middle" fill="#ffd200" font-size="15" font-weight="bold">&#x1f512; shared-memory.json</text>
  <text x="230" y="765" text-anchor="middle" fill="#a0c8e8" font-size="12">Architecture decisions, API conventions,</text>
  <text x="230" y="782" text-anchor="middle" fill="#a0c8e8" font-size="12">coding standards, algorithm specs</text>
  <text x="230" y="805" text-anchor="middle" fill="#70a0c0" font-size="11">Read: ALL &#x2713;  |  Write: Approval Required &#x1f512;</text>

  <!-- approval-queue.json -->
  <rect x="395" y="722" width="280" height="95" rx="10" fill="#301830" stroke="#c94b9b" stroke-width="1.2" opacity="0.9"/>
  <text x="535" y="745" text-anchor="middle" fill="#ff8080" font-size="15" font-weight="bold">&#x1f4cb; Approval Flow</text>
  <g font-size="12" fill="#d0a0c0">
    <text x="535" y="767" text-anchor="middle">Member submits request (pending)</text>
    <text x="535" y="787" text-anchor="middle">&#x2193;</text>
    <text x="535" y="803" text-anchor="middle">Marshall reviews &#x2192; approve / reject</text>
  </g>

  <!-- status.json + notifications -->
  <rect x="700" y="722" width="280" height="95" rx="10" fill="#103030" stroke="#38ef7d" stroke-width="1.2" opacity="0.9"/>
  <text x="840" y="745" text-anchor="middle" fill="#38ef7d" font-size="15" font-weight="bold">&#x1f4ca; Live Sync</text>
  <text x="840" y="768" text-anchor="middle" fill="#a0d8c0" font-size="12">status.json &#x2014; real-time team state</text>
  <text x="840" y="788" text-anchor="middle" fill="#a0d8c0" font-size="12">notifications/ &#x2014; async messages</text>
  <text x="840" y="808" text-anchor="middle" fill="#70b0a0" font-size="11">mtime-cached &#x2014; 97% token savings</text>

  <!-- Member → Memory lines -->
  <line x1="200" y1="442" x2="200" y2="660" stroke="#647dee" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="490" y1="442" x2="490" y2="660" stroke="#6dd5ed" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="780" y1="442" x2="780" y2="660" stroke="#f45c43" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="340" y1="620" x2="340" y2="660" stroke="#38ef7d" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="670" y1="620" x2="670" y2="660" stroke="#ee9ca7" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.25"/>

  <!-- ═══════ Workflow Pipeline ═══════ -->
  <rect x="70" y="865" width="1060" height="65" rx="12" fill="#151525" stroke="#333" stroke-width="1"/>
  <text x="600" y="888" text-anchor="middle" fill="#bbb" font-size="14" font-weight="600">&#x1f504; Standard Workflow &#x2014; 7 Phases</text>

  <g font-size="12" font-weight="500">
    <circle cx="120" cy="912" r="8" fill="#ffd200"/>
    <text x="120" y="916" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">M</text>
    <text x="120" y="930" text-anchor="middle" fill="#ccc" font-size="10">Require</text>

    <line x1="130" y1="912" x2="230" y2="912" stroke="#555" stroke-width="2"/>
    <circle cx="240" cy="912" r="8" fill="#647dee"/>
    <text x="240" y="916" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">E</text>
    <text x="240" y="930" text-anchor="middle" fill="#ccc" font-size="10">Algorithm</text>

    <line x1="250" y1="912" x2="370" y2="912" stroke="#555" stroke-width="2"/>
    <circle cx="380" cy="912" r="8" fill="#6dd5ed"/>
    <text x="380" y="916" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">F</text>
    <text x="380" y="930" text-anchor="middle" fill="#ccc" font-size="10">Develop</text>

    <line x1="390" y1="912" x2="510" y2="912" stroke="#555" stroke-width="2"/>
    <circle cx="520" cy="912" r="8" fill="#f45c43"/>
    <text x="520" y="916" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">S</text>
    <text x="520" y="930" text-anchor="middle" fill="#ccc" font-size="10">Test</text>

    <line x1="530" y1="912" x2="650" y2="912" stroke="#555" stroke-width="2"/>
    <circle cx="660" cy="912" r="8" fill="#38ef7d"/>
    <text x="660" y="916" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">L</text>
    <text x="660" y="930" text-anchor="middle" fill="#ccc" font-size="10">Analyze</text>

    <line x1="670" y1="912" x2="790" y2="912" stroke="#555" stroke-width="2"/>
    <circle cx="800" cy="912" r="8" fill="#ee9ca7"/>
    <text x="800" y="916" text-anchor="middle" fill="#4a2030" font-size="9" font-weight="bold">A</text>
    <text x="800" y="930" text-anchor="middle" fill="#ccc" font-size="10">Document</text>

    <line x1="810" y1="912" x2="930" y2="912" stroke="#555" stroke-width="2"/>
    <circle cx="940" cy="912" r="8" fill="#ffd200"/>
    <text x="940" y="916" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">M</text>
    <text x="940" y="930" text-anchor="middle" fill="#ccc" font-size="10">Deliver</text>

    <!-- Bug fix loop -->
    <path d="M 520 900 Q 450 878 380 900" stroke="#f45c43" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)" opacity="0.7"/>
    <text x="450" y="878" text-anchor="middle" fill="#f45c43" font-size="10">Bug &#x21ba; Fix</text>
  </g>

  <!-- ═══════ Checkpoint Bar ═══════ -->
  <rect x="70" y="950" width="1060" height="30" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="600" y="970" text-anchor="middle" fill="#777" font-size="12">&#x26a1; 7-Point Checkpoint:  Scope &#x2192; Memory &#x2192; Notify &#x2192; Status &#x2192; Skill &#x2192; Decompose &#x2192; Git Guard  &#x00a0;|&#x00a0; Violation &#x2192; auto-restart</text>

  <!-- ═══════ Footer ═══════ -->
  <text x="600" y="997" text-anchor="middle" fill="#444" font-size="10">Powered by Claude Code Agent Teams  &#x00b7;  github.com/Xinjing-Guo/Agent-Teams-Coder  &#x00b7;  MIT License</text>
</svg>
